site_name: ADIF MCP
site_description: ADIF MCP Documentation
site_url: https://adif-mcp.com/
repo_url: https://github.com/KI7MT/adif-mcp
edit_uri: edit/main/docs/
use_directory_urls: true

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - search.suggest
    - search.highlight
    - content.code.copy
nav:
  - Home: index.md
  - Getting Started:
      - Why ADIF-MCP: concepts/why-matters.md
      - ADIF Basics: concepts/adif-basics.md
      - Quick Start: getting-started.md
  - Tools Reference: mcp/tools.md
  - MCP Architecture:
      - Overview: mcp/overview.md
      - Validation Test Suite: mcp/validation.md
  - Specifications:
      - ADIF 3.1.6: spec/spec.md
      - Program IDs: program-id-policy.md
  # Hidden until implemented:
  # - User Guide:
  #     - Personas & Credentials: userguide/persona-management.md
  #     - Award Queries: userguide/awards.md
  #     - Choosing an LLM: concepts/choice-of-llms.md
  # - Integrations:
  #     - Overview: integrations/overview.md
  #     - LoTW: integrations/lotw/index.md
  #     - eQSL: integrations/eqsl/index.md
  # - Developer Guide:
  #     - Dev Env Setup: dev/dev-env-setup.md
  #     - Testing Playbook: dev/testing.md
  #     - Release Process: dev/release-process.md
  #     - Command Reference: dev/command-reference.md
  #     - Provider Schemas: dev/provider-schemas.md
  #     - Code Snippets: dev/code-snippets.md
  #     - Git Commits: dev/git-commits.md
  #     - Internal API: dev/internal-api.md
  #     - Probes: dev/probes.md
  #     - Troubleshooting: dev/troubleshooting.md
  # - Roadmap: roadmap.md

plugins:
  - search
  - mermaid2:
      arguments:
        theme: default
  - git-revision-date-localized:
      type: timeago
      fallback_to_build_date: true
      enable_creation_date: false
      timezone: UTC
  - redirects:
      redirect_maps:
        lotw.md: integrations/lotw/index.md
        eqsl.md: integrations/eqsl/index.md
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google   # or "numpy", both supported
            show_source: true
            show_root_toc_entry: false
            heading_level: 2

markdown_extensions:
  - admonition
  - abbr
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tabbed
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - toc:
      permalink: true
